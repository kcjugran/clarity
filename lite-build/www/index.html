  --cg-border: var(--cg-border-light);
  --cg-accent: #8b93c9;
  --cg-accent-hi: #f0eef7;
  --cg-accent-dim: color-mix(in srgb, var(--cg-accent) 55%, black);
  --cg-gold: #ffd166;
  --cg-frame: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" shape-rendering="crispEdges"><defs><g id="c"><rect x="3" y="0" width="5" height="1" fill="%230d0e18"/><rect x="2" y="1" width="1" height="1" fill="%230d0e18"/><rect x="1" y="2" width="1" height="1" fill="%230d0e18"/><rect x="0" y="3" width="1" height="5" fill="%230d0e18"/><rect x="3" y="1" width="5" height="2" fill="%238b93c9"/><rect x="2" y="2" width="1" height="1" fill="%238b93c9"/><rect x="1" y="3" width="2" height="5" fill="%238b93c9"/><rect x="3" y="3" width="5" height="1" fill="%233a4066"/><rect x="3" y="4" width="1" height="4" fill="%233a4066"/><rect x="4" y="4" width="4" height="1" fill="%230d0e18"/><rect x="4" y="5" width="1" height="3" fill="%230d0e18"/></g><g id="e"><rect x="8" y="0" width="8" height="1" fill="%230d0e18"/><rect x="8" y="1" width="8" height="2" fill="%238b93c9"/><rect x="8" y="3" width="8" height="1" fill="%233a4066"/><rect x="8" y="4" width="8" height="1" fill="%230d0e18"/></g></defs><use href="%23c"/><use href="%23c" transform="rotate(90 12 12)"/><use href="%23c" transform="rotate(180 12 12)"/><use href="%23c" transform="rotate(270 12 12)"/><use href="%23e"/><use href="%23e" transform="rotate(90 12 12)"/><use href="%23e" transform="rotate(180 12 12)"/><use href="%23e" transform="rotate(270 12 12)"/></svg>');
  --cg-text: #f0eef7;
  --cg-text-secondary: #9a9ab8;
  --cg-grid: 8px;
  --cg-font-display: 'Silkscreen', monospace;
  --cg-font-question: 'Pixelify Sans', 'Silkscreen', monospace;
  --cg-t-press: 90ms;
  --cg-ease-out: cubic-bezier(0.16, 1, 0.3, 1);
}

* { box-sizing: border-box; }

html, body { height: 100%; background: var(--cg-canvas); }

body {
  margin: 0;
  color: var(--cg-text);
  font-family: var(--cg-font-question);
  -webkit-font-smoothing: antialiased;
}

button, input, textarea { font-family: inherit; color: inherit; }
button { cursor: pointer; }

.cg-app {
  min-height: 100%;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: calc(var(--cg-grid) * 3);
  gap: calc(var(--cg-grid) * 3);
}

.cg-wrap {
  width: 100%;
  max-width: 640px;
  display: flex;
  flex-direction: column;
  gap: calc(var(--cg-grid) * 3);
}

.cg-signal-label {
  font-family: var(--cg-font-display);
  font-size: 14px;
  color: var(--cg-text-secondary);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-align: center;
}

.cg-tile-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--cg-grid);
  width: 100%;
}

@media (max-width: 420px) {
  .cg-tile-grid { grid-template-columns: 1fr; }
}

.cg-tile {
  min-height: 72px;
  background: var(--cg-panel);
  border: 8px solid transparent;
  border-image: var(--cg-frame) 8 repeat;
  image-rendering: pixelated;
  color: var(--cg-text);
  font-family: var(--cg-font-question);
  font-size: 16px;
  padding: var(--cg-grid) calc(var(--cg-grid) * 1.5);
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-items: center;
  justify-content: center;
  text-align: center;
  transition: transform var(--cg-t-press) ease-out, border-color var(--cg-t-press) ease-out,
    background-color var(--cg-t-press) ease-out;
}

.cg-tile-emoji {
  font-size: 26px;
  line-height: 1;
  /* keep emoji glyphs colourful on every OS, immune to the pixel theme */
  font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
}

.cg-tile-label { display: block; }

.cg-tile:hover, .cg-tile:focus-visible {
  border-color: var(--cg-accent);
  transform: translateY(-1px);
  outline: none;
}

.cg-tile:active {
  filter: brightness(1.5);
  background: color-mix(in srgb, var(--cg-accent) 30%, var(--cg-panel));
  transform: translateY(2px);
}

.cg-journal-row {
  display: flex;
  flex-direction: column;
  gap: calc(var(--cg-grid) * 1.5);
  width: 100%;
  margin-top: var(--cg-grid);
}

.cg-journal-divider {
  width: 100%;
  height: 1px;
  background: var(--cg-border);
  opacity: 0.4;
}

.cg-journal-split {
  display: flex;
  gap: var(--cg-grid);
  width: 100%;
}

.cg-journal-button {
  width: 100%;
  min-height: 64px;
  background: var(--cg-panel);
  border: 8px solid transparent;
  border-image: var(--cg-frame) 8 repeat;
  image-rendering: pixelated;
  color: var(--cg-text);
  font-family: var(--cg-font-question);
  font-size: 16px;
  padding: var(--cg-grid) calc(var(--cg-grid) * 2);
  transition: transform var(--cg-t-press) ease-out, border-color var(--cg-t-press) ease-out;
}

.cg-journal-button-half {
  flex: 1 1 50%;
}

.cg-journal-button:hover {
  border-color: var(--cg-accent);
  transform: translateY(-1px);
}

/* ---- questions screen ---- */
.cg-back-link {
  background: none;
  border: none;
  color: var(--cg-text-secondary);
  font-size: 13px;
  letter-spacing: 0.04em;
  text-align: left;
  padding: 4px 0;
  align-self: flex-start;
}
.cg-back-link:hover { color: var(--cg-accent); }

.cg-mood-title {
  font-family: var(--cg-font-display);
  font-size: 22px;
  letter-spacing: 0.06em;
  color: var(--cg-accent-hi);
  text-align: center;
}

.cg-qa-block {
  display: flex;
  flex-direction: column;
  gap: calc(var(--cg-grid) * 1.25);
}

.cg-question-text {
  font-family: var(--cg-font-question);
  font-size: 22px;
  line-height: 1.35;
  font-weight: 400;
}

@media (max-width: 480px) {
  .cg-question-text { font-size: 19px; }
}

.cg-free-input {
  width: 100%;
  background: var(--cg-panel);
  border: 8px solid transparent;
  border-image: var(--cg-frame) 8 repeat;
  image-rendering: pixelated;
  color: var(--cg-text);
  padding: calc(var(--cg-grid) * 2);
  font-size: 16px;
  font-family: var(--cg-font-question);
  resize: vertical;
  min-height: 80px;
}

.cg-free-input:focus {
  outline: none;
  filter: brightness(1.2);
}

.cg-footer-row {
  display: flex;
  flex-direction: column;
  gap: var(--cg-grid);
  margin-top: calc(var(--cg-grid) * 2);
  padding-bottom: calc(var(--cg-grid) * 4);
}

.cg-continue-button {
  width: 100%;
  padding: calc(var(--cg-grid) * 2);
  background: var(--cg-panel);
  border: 2px solid var(--cg-accent-dim);
  color: var(--cg-accent);
  font-family: var(--cg-font-display);
  font-size: 16px;
  letter-spacing: 0.06em;
}
.cg-continue-button:hover { border-color: var(--cg-accent); }

.cg-copy-status {
  text-align: center;
  color: var(--cg-accent-hi);
  font-family: var(--cg-font-display);
  font-size: 13px;
  min-height: 1.2em;
}

.cg-hidden { display: none !important; }

.cg-mood-header {
  display: flex;
  flex-direction: column;
  gap: calc(var(--cg-grid) * 0.5);
  align-items: center;
}
</style>
</head>
<body>
<div class="cg-app">
  <div class="cg-wrap" id="pickerScreen">
    <div class="cg-signal-label">How do you feel?</div>
    <div class="cg-tile-grid" id="tileGrid"></div>
    <div class="cg-journal-row">
      <div class="cg-journal-divider" aria-hidden="true"></div>
      <div class="cg-journal-split">
        <button type="button" class="cg-journal-button cg-journal-button-half" id="journalMorningButton"><span class="cg-tile-emoji" aria-hidden="true">🌅</span> Morning</button>
        <button type="button" class="cg-journal-button cg-journal-button-half" id="journalEveningButton"><span class="cg-tile-emoji" aria-hidden="true">🌙</span> Evening</button>
      </div>
    </div>
  </div>

  <div class="cg-wrap cg-hidden" id="questionsScreen">
    <button type="button" class="cg-back-link" id="backLink">&larr; pick another mood</button>
    <div class="cg-mood-header">
      <div class="cg-mood-title" id="moodTitle"></div>
    </div>
    <div id="qaContainer"></div>
    <div class="cg-footer-row">
      <button type="button" class="cg-continue-button" id="copyButton">Copy all Q&amp;A</button>
      <div class="cg-copy-status" id="copyStatus"></div>
    </div>
  </div>
</div>

<textarea id="copyFallback" class="cg-hidden" aria-hidden="true"></textarea>

<script>
// ---- Static data, reproduced verbatim from clarity-genie's src/engine-v2/feelingMap.ts +
// src/engine-v2/bank.ts (Morning/Evening journal appended separately as a split row, matching
// Feeling.tsx's cg-journal-split layout). ----
var DATA = {"moods":[{"id":"bored","label":"bored","questions":["What are your greatest values, and how have those values already been expressed today?","What future am I genuinely inspired to create over the next 12 months?","If I were fully aligned with my inspiration, how would I naturally spend the rest of today?","What is my current way of spending the day giving me that this ideal day is not?","What have I learned about myself through answering these questions?"]},{"id":"confused","label":"confused","questions":["What are your greatest values, and how have those values already been expressed today?","What future am I genuinely inspired to create over the next 12 months?","If I were fully aligned with my inspiration, how would I naturally spend the rest of today?","What is my current way of spending the day giving me that this ideal day is not?","What have I learned about myself through answering these questions?"]},{"id":"notSure","label":"not sure how I feel","questions":["If you could not fail or be judged, and had to spend the next 20 years building them, what projects would you pursue? List as many as come to mind.","Of those projects, which ones feel most uniquely suited to your strengths, experiences, and perspective? Which ones call to you the most deeply?","For each of those projects, what evidence suggests you could successfully pursue it?","For each project, what is the real reason you haven't pursued or achieved it yet?","For each project, what benefit are you getting from not fully pursuing or achieving it?","For each project, how could you make the journey more enjoyable, meaningful, and sustainable instead of overwhelming?","If you started today and gave each project your best effort for one year, what's the highest level you could realistically reach?","For each project, what people, skills, resources, habits, systems, or support would give you the best chance of reaching that one-year goal?","Imagine you've achieved the one-year goal for each project. What does a typical day in your life look like, and how is it different from your life today?","What is the single highest-impact action you can take in the next 30 minutes to move one or more of these projects forward?"]},{"id":"procrastinating","label":"procrastinating","questions":["What do I want truly here vs what I have?","If I say I truly want this, what has consistently stopped me from already creating it?","What benefits am I currently receiving from not having this?","What costs, responsibilities, or changes do I believe will come with having this?","If I don't create this outcome, what will it cost me one year from now?","If my current limitations didn't exist, what would the most effective next step be?","What would success look like for me one year from now if I stayed committed to this goal?","What do I need right now to ensure I reach this vision?","How could I make the process of achieving this 20–50% more enjoyable?","What have I learned from this about me?","What is the smallest action I can take in the next 24 hours that proves I have chosen this goal over my current comfort?"]},{"id":"anxious","label":"anxious","questions":["What part of yourself can't you love here that you're trying to avoid?","What is the positive intention of this feeling?","What is the benefit of the unresolved behaviours?","What is the loss of not experiencing this?","How is this helping you align with your purpose?","What unverified assumptions do I have here about the situation or the other person?","What benefit would you get in completely resolving this?","What is the key lesson to take from this?","What's one key action you could take that would help resolve this situation?"]},{"id":"overwhelmed","label":"overwhelmed","questions":["What do I want truly here vs what I have?","If I say I truly want this, what has consistently stopped me from already creating it?","What benefits am I currently receiving from not having this?","What costs, responsibilities, or changes do I believe will come with having this?","If I don't create this outcome, what will it cost me one year from now?","If my current limitations didn't exist, what would the most effective next step be?","What would success look like for me one year from now if I stayed committed to this goal?","What do I need right now to ensure I reach this vision?","How could I make the process of achieving this 20–50% more enjoyable?","What have I learned from this about me?","What is the smallest action I can take in the next 24 hours that proves I have chosen this goal over my current comfort?"]},{"id":"volatile","label":"volatile","questions":["What part of yourself can't you love here that you're trying to avoid?","What is the positive intention of this feeling?","What is the benefit of the unresolved behaviours?","What is the loss of not experiencing this?","How is this helping you align with your purpose?","What unverified assumptions do I have here about the situation or the other person?","What benefit would you get in completely resolving this?","What is the key lesson to take from this?","What's one key action you could take that would help resolve this situation?"]},{"id":"drained","label":"drained","questions":["What are your greatest values, and how have those values already been expressed today?","What future am I genuinely inspired to create over the next 12 months?","If I were fully aligned with my inspiration, how would I naturally spend the rest of today?","What is my current way of spending the day giving me that this ideal day is not?","What have I learned about myself through answering these questions?"]},{"id":"demotivated","label":"demotivated","questions":["What matters most in life right now?","What's the one most useful thing to accomplish today?","What's stopping me from doing it?","What's the smallest step I can take right now to address that resistance?","What's one tiny move toward what I actually want?","What did I learn or notice?","Where does this fit in my 6–12 month vision?"]},{"id":"wantSomething","label":"I want something","questions":["What do I want truly here vs what I have?","If I say I truly want this, what has consistently stopped me from already creating it?","What benefits am I currently receiving from not having this?","What costs, responsibilities, or changes do I believe will come with having this?","If I don't create this outcome, what will it cost me one year from now?","If my current limitations didn't exist, what would the most effective next step be?","What would success look like for me one year from now if I stayed committed to this goal?","What do I need right now to ensure I reach this vision?","How could I make the process of achieving this 20–50% more enjoyable?","What have I learned from this about me?","What is the smallest action I can take in the next 24 hours that proves I have chosen this goal over my current comfort?"]},{"id":"overcomeHabit","label":"I want to overcome a habit","questions":["What do I want truly here vs what I have?","If I say I truly want this, what has consistently stopped me from already creating it?","What benefits am I currently receiving from not having this?","What costs, responsibilities, or changes do I believe will come with having this?","If I don't create this outcome, what will it cost me one year from now?","If my current limitations didn't exist, what would the most effective next step be?","What would success look like for me one year from now if I stayed committed to this goal?","What do I need right now to ensure I reach this vision?","How could I make the process of achieving this 20–50% more enjoyable?","What have I learned from this about me?","What is the smallest action I can take in the next 24 hours that proves I have chosen this goal over my current comfort?"]},{"id":"overcomeFear","label":"Overcome a fear","questions":["What is the fear you're feeling versus the feeling you want to feel?","What is stopping you from feeling the way you want to feel?","What benefit do you get from feeling this fear?","What price are you paying by staying the same?","What would your life look like in one year if you overcame this fear?","Think of others who have overcome this fear — what do you think they did?","What do you need to overcome these fears?","What is stopping you from taking these steps?","What would you need to overcome these obstacles?","What can you do today to make progress on this?","What did today teach you?","What is your immediate action now?"]},{"id":"loneliness","label":"Loneliness","questions":["When you think of love, what comes to mind?","When was the last time you felt a deep connection with someone?","Describe the ideal person you wish you could talk to right now.","What is the price of not having such people in your life?","What stops you from finding such people right now?","How can you overcome these obstacles?","What do you need to ensure you follow through?","What can you do today to make progress?","What did this journal teach you?","What is your immediate action right now?"]},{"id":"somethingElse","label":"something else","questions":["What do I want truly here vs what I have?","If I say I truly want this, what has consistently stopped me from already creating it?","What benefits am I currently receiving from not having this?","What costs, responsibilities, or changes do I believe will come with having this?","If I don't create this outcome, what will it cost me one year from now?","If my current limitations didn't exist, what would the most effective next step be?","What would success look like for me one year from now if I stayed committed to this goal?","What do I need right now to ensure I reach this vision?","How could I make the process of achieving this 20–50% more enjoyable?","What have I learned from this about me?","What is the smallest action I can take in the next 24 hours that proves I have chosen this goal over my current comfort?"]},{"id":"journalMorning","label":"Morning","questions":["What do I want most in life?","What stops me from getting it?","What is the benefit of my current life over my ideal?","What is the cost of living my current life?","What happens in a year's time if I live my ideals?","What do I need to come closer to my ideals?","What can I do today to come closer to my vision?","What did I learn from this journal?"]},{"id":"journal","label":"Evening","questions":["What's one thing that went well today?","What's one thing that was hard or draining today?","What did today teach you about yourself?","Where did your actions match what you actually value today — and where did they drift?","What's the one thing you want to carry into tomorrow?","What is the one thing for tomorrow?"]}]};

// One emoji per feeling — the offline Lite has no SVG icon set, so emojis
// carry the mood glyph (render on every OS via the emoji font stack above).
var EMOJI = {
  bored: '😑',            // 😑
  confused: '😕',         // 😕
  notSure: '🤔',          // 🤔
  procrastinating: '⏳',        // ⏳
  anxious: '😰',          // 😰
  overwhelmed: '🤯',      // 🤯 (single codepoint — ZWJ 😵‍💫 splits on some OSes)
  volatile: '🌋',         // 🌋
  drained: '😫',          // 😫 (single codepoint — ZWJ 😮‍💨 splits on some OSes)
  demotivated: '😞',      // 😞
  wantSomething: '🎯',    // 🎯
  overcomeHabit: '🔁',    // 🔁
  overcomeFear: '🦁',     // 🦁
  loneliness: '🕊️', // 🕊️
  somethingElse: '💭',    // 💭
  journalMorning: '🌅',   // 🌅
  journal: '🌙'           // 🌙
};

var answers = {}; // { moodId: [answerStr, ...] } kept in memory for the session

var tileGrid = document.getElementById('tileGrid');
var journalMorningButton = document.getElementById('journalMorningButton');
var journalEveningButton = document.getElementById('journalEveningButton');
var pickerScreen = document.getElementById('pickerScreen');
var questionsScreen = document.getElementById('questionsScreen');
var moodTitle = document.getElementById('moodTitle');
var qaContainer = document.getElementById('qaContainer');
var backLink = document.getElementById('backLink');
var copyButton = document.getElementById('copyButton');
var copyStatus = document.getElementById('copyStatus');
var copyFallback = document.getElementById('copyFallback');

var currentMood = null;

// Tile grid = all moods except Morning/Evening journal (they get their own split row, matching the real app).
DATA.moods.filter(function (m) { return m.id !== 'journal' && m.id !== 'journalMorning'; }).forEach(function (m) {
  var btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'cg-tile';
  var emoji = document.createElement('span');
  emoji.className = 'cg-tile-emoji';
  emoji.setAttribute('aria-hidden', 'true');
  emoji.textContent = EMOJI[m.id] || '';
  var label = document.createElement('span');
  label.className = 'cg-tile-label';
  label.textContent = m.label;
  btn.appendChild(emoji);
  btn.appendChild(label);
  btn.addEventListener('click', function () { openMood(m.id); });
  tileGrid.appendChild(btn);
});

journalMorningButton.addEventListener('click', function () { openMood('journalMorning'); });
journalEveningButton.addEventListener('click', function () { openMood('journal'); });
backLink.addEventListener('click', function () { showPicker(); });

function findMood(id) {
  for (var i = 0; i < DATA.moods.length; i++) {
    if (DATA.moods[i].id === id) return DATA.moods[i];
  }
  return null;
}

function openMood(id) {
  currentMood = id;
  var mood = findMood(id);
  if (!mood) return;
  if (!answers[id]) answers[id] = mood.questions.map(function () { return ''; });

  moodTitle.textContent = (EMOJI[id] ? EMOJI[id] + '  ' : '') + mood.label;
  qaContainer.innerHTML = '';

  mood.questions.forEach(function (q, i) {
    var block = document.createElement('div');
    block.className = 'cg-qa-block';

    var heading = document.createElement('div');
    heading.className = 'cg-question-text';
    heading.textContent = q;

    var textarea = document.createElement('textarea');
    textarea.className = 'cg-free-input';
    textarea.rows = 3;
    textarea.value = answers[id][i];
    textarea.addEventListener('input', function () {
      answers[id][i] = textarea.value;
    });

    block.appendChild(heading);
    block.appendChild(textarea);
    qaContainer.appendChild(block);
  });

  copyStatus.textContent = '';
  pickerScreen.classList.add('cg-hidden');
  questionsScreen.classList.remove('cg-hidden');
  window.scrollTo(0, 0);
}

function showPicker() {
  pickerScreen.classList.remove('cg-hidden');
  questionsScreen.classList.add('cg-hidden');
  window.scrollTo(0, 0);
}

function todayStr() {
  var d = new Date();
  var mm = String(d.getMonth() + 1).padStart(2, '0');
  var dd = String(d.getDate()).padStart(2, '0');
  return d.getFullYear() + '-' + mm + '-' + dd;
}

function buildCopyText() {
  var mood = findMood(currentMood);
  if (!mood) return '';
  var lines = [];
  lines.push('Clarity — ' + mood.label);
  lines.push(todayStr());
  lines.push('');
  mood.questions.forEach(function (q, i) {
    var a = (answers[currentMood][i] || '').trim();
    lines.push('Q: ' + q);
    lines.push('A: ' + (a ? a : '(blank)'));
    lines.push('');
  });
  return lines.join('\n').trim() + '\n';
}

copyButton.addEventListener('click', function () {
  var text = buildCopyText();
  var showCopied = function () {
    copyStatus.textContent = 'copied ✓';
    window.setTimeout(function () { copyStatus.textContent = ''; }, 2000);
  };
  var fallbackCopy = function () {
    copyFallback.value = text;
    copyFallback.classList.remove('cg-hidden');
    copyFallback.focus();
    copyFallback.select();
    try {
      document.execCommand('copy');
      showCopied();
    } catch (e) {
      copyStatus.textContent = 'copy failed — select text manually';
    }
    copyFallback.classList.add('cg-hidden');
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(showCopied, fallbackCopy);
  } else {
    fallbackCopy();
  }
});
</script>
</body>
</html>
